name: OlcRTCClient
options:
  bundleIdPrefix: ru.pasklove
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  Tun2SocksKit:
    url: https://github.com/EbrahimTahernejad/Tun2SocksKit
    from: 5.14.4
targets:
  OlcRTCClient:
    type: application
    platform: iOS
    sources:
      - Sources/OlcRTCApp
    info:
      path: Sources/OlcRTCApp/Info.plist
      properties:
        CFBundleDisplayName: OlcRTC
        CFBundleURLTypes:
          - CFBundleURLName: ru.pasklove.olcrtc
            CFBundleURLSchemes:
              - olcrtc
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: Sources/OlcRTCApp/OlcRTCClient.entitlements
      properties: {}
    dependencies:
      - framework: Frameworks/Mobile.xcframework
        embed: true
      - target: OlcRTCPacketTunnel
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.pasklove.olcrtc
  OlcRTCPacketTunnel:
    type: app-extension
    platform: iOS
    productType: com.apple.product-type.app-extension
    sources:
      - Sources/OlcRTCPacketTunnel
    info:
      path: Sources/OlcRTCPacketTunnel/Info.plist
      properties:
        CFBundleDisplayName: OlcRTC Tunnel
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: Sources/OlcRTCPacketTunnel/OlcRTCPacketTunnel.entitlements
      properties: {}
    dependencies:
      - framework: Frameworks/Mobile.xcframework
        embed: true
      - framework: Frameworks/Libbox.xcframework
        embed: true
      - package: Tun2SocksKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.pasklove.olcrtc.tunnel
  OlcRTCAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/OlcRTCAppTests
    dependencies:
      - target: OlcRTCClient
