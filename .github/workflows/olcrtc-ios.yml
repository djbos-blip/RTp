name: OlcRTC iOS

on:
  workflow_dispatch:
  push:
    paths:
      - "OlcRTC-iOS/**"
      - "README.md"
      - ".github/workflows/olcrtc-ios.yml"

permissions:
  contents: read

concurrency:
  group: olcrtc-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: OlcRTC-iOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: false

      - name: Install tools
        run: |
          brew install xcodegen
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Mobile.xcframework
        run: |
          chmod +x Scripts/build-mobile-xcframework.sh
          ./Scripts/build-mobile-xcframework.sh

      - name: Download Libbox.xcframework
        run: |
          chmod +x Scripts/download-libbox-xcframework.sh
          ./Scripts/download-libbox-xcframework.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build simulator app
        run: |
          xcodebuild \
            -project OlcRTCClient.xcodeproj \
            -scheme OlcRTCClient \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build unsigned device app
        run: |
          xcodebuild \
            -project OlcRTCClient.xcodeproj \
            -scheme OlcRTCClient \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          chmod +x Scripts/package-unsigned-ipa.sh
          Scripts/package-unsigned-ipa.sh

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: OlcRTCClient-unsigned-ipa
          path: OlcRTC-iOS/build/ipa/OlcRTCClient-unsigned.ipa
          if-no-files-found: error

      - name: Test URI parser
        run: |
          xcodebuild \
            -project OlcRTCClient.xcodeproj \
            -scheme OlcRTCAppTests \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            test
